terrain_analysis:
  ros__parameters:
    scanVoxelSize: 0.05                 #点云下采样的体素大小。增大提高处理速度，减小保留更多地形细节
    decayTime: 0.5                      # 点云时间差阈值 大于则不会被处理（缩短以加快动态障碍物清除）
    noDecayDis: 0.0                     # 点云距离阈值 小于该阈值不考虑时间差（设0让所有点都受衰减控制，否则近距离障碍物永远不消失）
    clearingDis: 0.0                    # 该距离外的点会被清除
    useSorting: True                    # 这个参数开起来就能上坡了；如果 use_sorting,那么就以周围点中的分位点作为地面点，否则以最低点作为地面点；周围其余点相对于地面点的高度作为通过代价，所以对于坡面，有的点的代价是正，有的是负，就相互抵消了；不要与 consider_drop 同时开启，计算上会有冲突
    quantileZ: 0.2                      # useful if use_sorting is enabled.
    considerDrop: False                 # 考虑凹下去的地面,开启则将相对于地面点的高度取绝对值
    limitGroundLift: False
    maxGroundLift: 0.3
    clearDyObs: False                    # 清除动态物体的话，有动态物体走过的地方就走不了了
    minDyObsDis: 0.5                    # 以下参数都是在 clear_dy_obs 的情况下才有用的
    minDyObsAngle: 5.0
    minDyObsRelZ: -0.3
    absDyObsRelZThre: 0.15
    minDyObsVFOV: -28.0
    maxDyObsVFOV: 33.0
    minDyObsPointNum: 3
    noDataObstacle: False               # treat no data as obstacle
    noDataBlockSkipNum: 0
    minBlockPointNum: 10
    vehicleHeight: 0.5                  # 小于车辆高度的点才会进行处理
    voxelPointUpdateThre: 100
    voxelTimeUpdateThre: 0.5            # 体素重新过滤周期（秒），缩短以加快障碍物清除速度
    minRelZ: -1.5                       # min_rel_z 以及 max_rel_z 限制了有效点云点的Z值范围，用于对天花板和地板进行处理
    maxRelZ: 0.5
    disRatioZ: 0.2                      # Z 值的最大最小范围由这两个值决定，但是并不等于这两个值，是有一个比例关系的，距离机器人越远，限定范围就越大，这其中考虑了坡度

terrain_analysis_ext:
  ros__parameters:
    scanVoxelSize: 0.1
    decayTime: 0.2
    noDecayDis: 0.0                     # 设0让所有点都受衰减控制，否则近距离障碍物永远不消失
    clearingDis: 15.0
    useSorting: true
    quantileZ: 0.2
    vehicleHeight: 1.0
    voxelPointUpdateThre: 100
    voxelTimeUpdateThre: 0.5
    lowerBoundZ: -1.5
    upperBoundZ: 0.5
    disRatioZ: 0.2
    checkTerrainConn: False
    terrainUnderVehicle: -0.75
    terrainConnThre: 0.5
    ceilingFilteringThre: 2.0
    localTerrainMapRadius: 4.0

