pb2025_sentry_behavior_server:
  ros__parameters:
    use_sim_time: true
    action_name: pb2025_sentry_behavior         # Optional
    tick_frequency: 5                          # Optional (defaults to 100 Hz)
    groot2_port: 1668                           # Optional (defaults to 1667)
    ros_plugins_timeout: 10000                  # ✅ 增加到 10 秒 (原来是 1000ms)
    use_cout_logger: false                      # Optional (defaults to false)

    plugins:
      - pb2025_sentry_behavior/bt_plugins

    # ═══════════════════════════════════════════════════════════
    # 策略选择 (二选一, 注释掉不用的那行):
    #   rmul/ + rmul_2026_patrol       → RMUL 巡逻策略 (无姿态切换)
    #   rmuc/ + rmuc_2025_with_stance  → RMUC 7v7 姿态切换策略
    # ═══════════════════════════════════════════════════════════
    behavior_trees:
      - pb2025_sentry_behavior/behavior_trees/rmul
      # - pb2025_sentry_behavior/behavior_trees/rmuc

    CalculateAttackPose:
      attack_radius: 2.0                        # 攻击半径（米）
      num_sectors: 36                           # 扇区划分数量
      cost_threshold: 50                        # 栅格的占用概率，大于该值将被视为障碍物 [0, 100]
      robot_base_frame: chassis
      visualize: true

pb2025_sentry_behavior_client:
  ros__parameters:
    use_sim_time: true
    # ═══════════════════════════════════════════════════════════
    # target_tree 必须与上面 behavior_trees 目录中的 XML 对应:
    #   rmul/ → rmul_2026_patrol
    #   rmuc/ → rmuc_2025_with_stance
    # ═══════════════════════════════════════════════════════════
    target_tree: rmul_2026_center_spin
    # target_tree: rmuc_2025_with_stance
